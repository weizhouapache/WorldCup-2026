name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy-preview:
    name: Deploy preview
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site
        run: |
          rm -rf _site
          mkdir -p _site
          rsync -av \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '_site/' \
            ./ _site/
          touch _site/.nojekyll

      - name: Deploy preview to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: _site
          target-folder: WorldCup-2026/PR-${{ github.event.pull_request.number }}
          clean: false

      - name: Post preview URL comment
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const url = `https://www.cloudabc.eu/WorldCup-2026/PR-${pr}/`;
            const sha = context.payload.pull_request.head.sha.slice(0, 7);
            const marker = '<!-- pr-preview-bot -->';
            const body = [
              marker,
              `### 🔍 Preview deployment`,
              `**URL:** ${url}`,
              `**Commit:** \`${sha}\``,
              '',
              '_Updated on every push. Removed when the PR is closed._',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr,
                body,
              });
            }

  teardown-preview:
    name: Tear down preview
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Remove preview folder
        run: |
          rm -rf WorldCup-2026/PR-${{ github.event.pull_request.number }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Remove PR ${{ github.event.pull_request.number }} preview"
          git push

      - name: Update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const marker = '<!-- pr-preview-bot -->';
            const body = [
              marker,
              `### 🗑️ Preview removed`,
              '_This preview deployment was removed because the PR was closed._',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            }
